<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodify AI - 감성 분석 서비스</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">Moodify <span>AI</span></h1>
        </header>

        <main>
            <section class="hero">
                <h2>당신의 마음을 분석해 드립니다.</h2>
                <p>오늘의 기분이나 생각나는 문장을 입력해보세요. AI가 그 속의 감성을 찾아냅니다.</p>
            </section>

            <section class="input-area">
                <div class="card">
                    <textarea id="textInput" placeholder="이곳에 내용을 입력하세요 (최대 500자)" maxlength="500"></textarea>
                    <div class="char-count"><span id="currentCharCount">0</span>/500</div>
                    <button id="analyzeBtn" class="primary-btn" disabled>분석하기</button>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Moodify AI. Powered by OpenAI</p>
        </footer>
    </div>

    <!-- 분석 결과 모달 -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="loading" class="loading-spinner"></div>
            <div id="resultContent" class="hidden">
                <h3 id="sentimentTitle">감정 분석 결과</h3>
                <div class="result-badge" id="sentimentBadge">긍정</div>
                <div class="confidence-bar">
                    <div class="label">신뢰도: <span id="confidenceValue">0</span>%</div>
                    <div class="progress-bg">
                        <div id="confidenceFill" class="progress-fill"></div>
                    </div>
                </div>
                <div class="reason-box">
                    <h4>분석 이유</h4>
                    <p id="sentimentReason"></p>
                </div>
                <button class="secondary-btn modal-close-btn">닫기</button>
            </div>
            <div id="errorContent" class="hidden">
                <h3>오류 발생</h3>
                <p id="errorMessage"></p>
                <button class="secondary-btn modal-close-btn">다시 시도</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
